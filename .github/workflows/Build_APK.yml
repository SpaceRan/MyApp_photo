name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    # 使用 Ubuntu 速度更快
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/MyApp.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: ./MyApp
        run: dotnet restore

      - name: Debug - Check File Content
        run: cat ./MyApp/MainPage.xaml.cs

      - name: Build APK
        working-directory: ./MyApp
        run: dotnet publish -f net10.0-android -c Release --no-restore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: '**/bin/**/Release/**/*.apk'