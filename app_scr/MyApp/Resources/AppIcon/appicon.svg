<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义颜色变量，方便修改 -->
  <defs>
    <style>
      .camera-body { fill: #B2DFDB; } /* 柔和薄荷绿 */
      .camera-detail { fill: #80CBC4; } /* 稍深的薄荷绿 */
      .lens-glass { fill: #4DB6AC; } /* 镜头深色 */
      .pen-body { fill: #FFF9C4; stroke: #FDD835; stroke-width: 2; } /* 淡鹅黄 */
      .pen-tip { fill: #616161; } /* 深灰笔尖 */
      .flash { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- 相机部分 -->
  <!-- 相机顶部突起 -->
  <rect x="65" y="55" width="70" height="15" rx="5" class="camera-detail"/>
  
  <!-- 相机机身主体 -->
  <rect x="50" y="70" width="100" height="75" rx="12" class="camera-body"/>
  
  <!-- 镜头外圈 -->
  <circle cx="100" cy="107.5" r="22" class="camera-detail"/>
  
  <!-- 镜头内圈 (玻璃感) -->
  <circle cx="100" cy="107.5" r="14" class="lens-glass"/>
  
  <!-- 镜头高光 -->
  <circle cx="96" cy="103.5" r="4" fill="white" fill-opacity="0.4"/>

  <!-- 快门按钮 -->
  <circle cx="125" cy="62.5" r="4" fill="#FFFFFF"/>

  <!-- 闪光灯/取景器 -->
  <rect x="60" y="60" width="15" height="8" rx="2" class="flash"/>

  <!-- 笔的部分 -->
  <!-- 笔身 (旋转放置) -->
  <g transform="rotate(-15 140 110)">
    <!-- 笔杆 -->
    <rect x="132" y="60" width="16" height="100" rx="8" class="pen-body"/>
    
    <!-- 笔尖部分 -->
    <path d="M132 160 L140 175 L148 160 Z" class="pen-tip"/>
    
    <!-- 笔夹装饰线 -->
    <line x1="140" y1="70" x2="140" y2="90" stroke="#FDD835" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>